{% extends "base.html" %}

{% block title %}Manage Equipment - Equipment Explorer{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-title">
        <h1>Manage Equipment</h1>
    </div>
    <p class="page-subtitle">Add equipment manually to the database</p>
</div>

<div style="margin-bottom: var(--space-lg);">
    <a href="{{ url_for('admin.database') }}" class="btn btn-ghost">Back to Database</a>
</div>

<div class="card" style="max-width: 600px;">
    <div class="card-header">
        <h3 class="card-title">Add New Equipment</h3>
    </div>
    <div class="card-body">
        <form id="equipmentForm">
            <div class="form-group" style="margin-bottom: var(--space-md);">
                <label style="display: block; margin-bottom: var(--space-xs); color: var(--text-secondary); font-size: 0.875rem;">Equipment Tag *</label>
                <input type="text" id="tag" name="tag" required
                       placeholder="e.g., 11AA001"
                       style="width: 100%; padding: var(--space-sm) var(--space-md); background: var(--bg-tertiary); border: 1px solid var(--border-default); border-radius: var(--radius-md); color: var(--text-primary); font-family: var(--font-mono);">
            </div>
            
            <div class="form-group" style="margin-bottom: var(--space-md);">
                <label style="display: block; margin-bottom: var(--space-xs); color: var(--text-secondary); font-size: 0.875rem;">Description</label>
                <input type="text" id="description" name="description"
                       placeholder="Equipment description"
                       style="width: 100%; padding: var(--space-sm) var(--space-md); background: var(--bg-tertiary); border: 1px solid var(--border-default); border-radius: var(--radius-md); color: var(--text-primary);">
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md); margin-bottom: var(--space-lg);">
                <div class="form-group">
                    <label style="display: block; margin-bottom: var(--space-xs); color: var(--text-secondary); font-size: 0.875rem;">Room/Compartment</label>
                    <input type="text" id="room" name="room"
                           placeholder="e.g., 0312"
                           style="width: 100%; padding: var(--space-sm) var(--space-md); background: var(--bg-tertiary); border: 1px solid var(--border-default); border-radius: var(--radius-md); color: var(--text-primary);">
                </div>
                <div class="form-group">
                    <label style="display: block; margin-bottom: var(--space-xs); color: var(--text-secondary); font-size: 0.875rem;">Deck</label>
                    <input type="text" id="deck" name="deck"
                           placeholder="e.g., Main Deck"
                           style="width: 100%; padding: var(--space-sm) var(--space-md); background: var(--bg-tertiary); border: 1px solid var(--border-default); border-radius: var(--radius-md); color: var(--text-primary);">
                </div>
            </div>
            
            <div id="formMessage" style="display: none; margin-bottom: var(--space-md); padding: var(--space-md); border-radius: var(--radius-md);"></div>
            
            <button type="submit" class="btn btn-primary">Add Equipment</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('equipmentForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const messageEl = document.getElementById('formMessage');
    messageEl.style.display = 'none';
    
    const data = {
        tag: document.getElementById('tag').value,
        description: document.getElementById('description').value,
        room: document.getElementById('room').value,
        deck: document.getElementById('deck').value
    };
    
    try {
        const response = await fetch('/admin/api/equipment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        
        if (result.success) {
            messageEl.style.background = 'rgba(0, 212, 170, 0.1)';
            messageEl.style.border = '1px solid var(--accent-primary)';
            messageEl.style.color = 'var(--accent-primary)';
            messageEl.textContent = `Equipment "${data.tag}" added successfully!`;
            messageEl.style.display = 'block';
            
            // Clear form
            this.reset();
        } else {
            messageEl.style.background = 'rgba(239, 68, 68, 0.1)';
            messageEl.style.border = '1px solid var(--accent-danger)';
            messageEl.style.color = 'var(--accent-danger)';
            messageEl.textContent = result.error || 'Failed to add equipment';
            messageEl.style.display = 'block';
        }
    } catch (error) {
        messageEl.style.background = 'rgba(239, 68, 68, 0.1)';
        messageEl.style.border = '1px solid var(--accent-danger)';
        messageEl.style.color = 'var(--accent-danger)';
        messageEl.textContent = 'Error: ' + error.message;
        messageEl.style.display = 'block';
    }
});
</script>
{% endblock %}
